<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveEditors</title>
  <style>
    :root{
      --bg:#bfe7ff;
      --sky-top:#def3ff;
      --sky-bottom:#b7e2ff;
      --grid:rgba(98,136,166,.24);
      --text:#1f2329;
      --soft:#56606a;
      --panel:#ffffffdc;
      --line:#d6dde6;
      --link:#234f7b;
      --grass-a:#84c96d;
      --grass-b:#5ca64a;
      --grass-c:#4a8c3c;
      --stone-a:#9da5ad;
      --stone-b:#8f98a1;
      --stone-c:#aeb5bc;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Segoe UI, system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        radial-gradient(150px 80px at 16% 16%, rgba(255,255,255,.82), rgba(255,255,255,0) 75%),
        radial-gradient(190px 90px at 74% 12%, rgba(255,255,255,.7), rgba(255,255,255,0) 76%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 62%, var(--bg));
      background-size:28px 28px,28px 28px,auto,auto,auto;
      overflow-x:hidden;
    }
    .page{
      max-width:920px;
      margin:34px auto 0;
      padding:0 16px 170px;
    }
    .sheet{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(4px);
      box-shadow:0 16px 36px rgba(30,40,54,.08);
      padding:22px 24px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.7rem,3.2vw,2.4rem);
      letter-spacing:.02em;
    }
    .lead{
      margin:0;
      color:var(--soft);
      line-height:1.55;
    }
    .quick-links{
      margin:16px 0 0;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .quick-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:.9rem;
      font-weight:600;
      border:1px solid #b7d1e7;
      border-radius:999px;
      padding:7px 12px;
      background:rgba(255,255,255,.86);
      box-shadow:0 3px 8px rgba(50,74,97,.12);
      text-decoration:none;
      color:#244b74;
      border-bottom:none;
      transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    }
    .quick-chip:hover{
      transform:translateY(-1px);
      border-color:#7faacf;
      box-shadow:0 5px 14px rgba(50,74,97,.18);
      border-bottom:none;
    }
    .quick-chip.ghost{
      color:#637486;
      background:#edf3f8;
      border-color:#d6e1ec;
    }
    h2{
      margin:24px 0 10px;
      font-size:1.08rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#2d3540;
    }
    ul{
      margin:0;
      padding-left:18px;
    }
    li{
      margin:10px 0;
      line-height:1.45;
    }
    .repo-meta{
      margin-left:8px;
      color:#5a6977;
      font-size:.84rem;
      white-space:nowrap;
    }
    a{
      color:var(--link);
      text-decoration:none;
      border-bottom:1px dashed rgba(35,79,123,.35);
    }
    a:hover{
      border-bottom-color:rgba(35,79,123,.85);
    }
    .scene{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:148px;
      pointer-events:none;
      z-index:30;
    }
    .clouds{
      position:absolute;
      left:0;
      right:0;
      bottom:74px;
      height:44px;
      overflow:hidden;
      opacity:.95;
    }
    .cloud{
      position:absolute;
      display:block;
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      box-shadow:
        20px -8px 0 5px rgba(255,255,255,.82),
        42px -3px 0 2px rgba(255,255,255,.82),
        58px 2px 0 0 rgba(255,255,255,.72);
      filter:drop-shadow(0 2px 3px rgba(80,117,145,.2));
      animation:cloudDrift 30s linear infinite;
    }
    .cloud-a{left:-120px;top:8px;width:72px;animation-duration:34s}
    .cloud-b{left:38%;top:2px;width:84px;animation-duration:44s;animation-delay:-14s}
    .cloud-c{left:72%;top:11px;width:66px;animation-duration:38s;animation-delay:-26s}
    .grass{
      position:absolute;
      left:0;
      right:0;
      bottom:48px;
      height:22px;
      background:linear-gradient(180deg,var(--grass-a) 0%,var(--grass-b) 72%,var(--grass-c) 100%);
      border-top:1px solid rgba(74,110,57,.35);
      box-shadow:inset 0 2px 3px rgba(255,255,255,.3), inset 0 -3px 4px rgba(37,75,29,.24);
      overflow:visible;
    }
    .grass:before,
    .grass:after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      pointer-events:none;
    }
    .grass:before{
      top:-8px;
      height:10px;
      background:repeating-linear-gradient(
        -62deg,
        rgba(126,183,97,.96) 0 7px,
        rgba(101,160,78,.96) 7px 14px
      ),
      repeating-linear-gradient(
        62deg,
        rgba(114,176,90,.6) 0 7px,
        rgba(89,144,69,.6) 7px 14px
      );
      opacity:1;
    }
    .grass:after{
      top:0;
      bottom:0;
      background:repeating-linear-gradient(
        90deg,
        rgba(58,102,47,0) 0 7px,
        rgba(58,102,47,.34) 7px 8px
      );
      opacity:.42;
    }
    .stone{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:48px;
      background:
        repeating-linear-gradient(90deg,var(--stone-a) 0 42px,var(--stone-b) 42px 84px,var(--stone-c) 84px 126px),
        linear-gradient(180deg,#b6bec6,#9da7b0);
      border-top:1px solid rgba(56,63,72,.4);
      box-shadow:inset 0 6px 10px rgba(255,255,255,.18);
    }
    .duck-lane{
      position:absolute;
      left:0;
      right:0;
      bottom:52px;
      height:96px;
      overflow:visible;
    }
    .duck-wrap{
      position:absolute;
      left:-120px;
      bottom:0;
      display:flex;
      align-items:flex-end;
      gap:10px;
      animation:duckWalk 16s linear infinite;
    }
    .duck{
      width:72px;
      height:72px;
      object-fit:contain;
      image-rendering:auto;
      filter:drop-shadow(0 4px 4px rgba(0,0,0,.18));
    }
    .bubble{
      position:relative;
      margin-bottom:72px;
      padding:7px 11px;
      background:#fff;
      border:1px solid #d7dee6;
      border-radius:999px;
      font-size:.87rem;
      color:#26313b;
      white-space:nowrap;
      box-shadow:0 6px 14px rgba(40,49,60,.12);
      min-width:140px;
      text-align:center;
    }
    .bubble:after{
      content:"";
      position:absolute;
      width:10px;height:10px;
      left:22px;
      bottom:-6px;
      border-right:1px solid #d7dee6;
      border-bottom:1px solid #d7dee6;
      background:#fff;
      transform:rotate(45deg);
    }
    @keyframes duckWalk{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 160px))}
    }
    @keyframes cloudDrift{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 220px))}
    }
    @media (max-width:680px){
      .sheet{padding:18px}
      .bubble{font-size:.8rem}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <h1>SaveEditors</h1>
      <p class="lead">Welcome to my profile. This is the simple home for our save editors.</p>
      <div id="quickLinks" class="quick-links">
        <span class="quick-chip ghost">Loading editor links...</span>
      </div>

      <h2>Save Editors</h2>
      <ul id="editorList">
        <li>Loading editors...</li>
      </ul>
    </section>
  </main>

  <div class="scene" aria-hidden="true">
    <div class="clouds">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="cloud cloud-c"></span>
    </div>
    <div class="duck-lane">
      <div class="duck-wrap">
        <img class="duck" src="https://files.kick.com/emotes/4147914/fullsize" alt="">
        <div id="duckBubble" class="bubble">welcome to my Profile</div>
      </div>
    </div>
    <div class="grass"></div>
    <div class="stone"></div>
  </div>

  <script>
    "use strict";
    const htmlEscape = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function getRepoPath(repoUrl) {
      try {
        const url = new URL(repoUrl);
        if (url.hostname.toLowerCase() !== "github.com") return "";
        const parts = url.pathname.replace(/^\/+|\/+$/g, "").split("/");
        if (parts.length < 2) return "";
        return `${parts[0]}/${parts[1].replace(/\.git$/i, "")}`;
      } catch {
        return "";
      }
    }

    async function fetchLastUpdatedDate(repoUrl) {
      const repoPath = getRepoPath(repoUrl);
      if (!repoPath) return "";
      try {
        const res = await fetch(`https://api.github.com/repos/${repoPath}/commits?per_page=1`, {
          headers: { Accept: "application/vnd.github+json" },
          cache: "no-store"
        });
        if (!res.ok) return "";
        const commits = await res.json();
        const iso = commits?.[0]?.commit?.committer?.date || commits?.[0]?.commit?.author?.date || "";
        if (!iso) return "";
        return new Date(iso).toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric"
        });
      } catch {
        return "";
      }
    }

    async function loadEditors() {
      const list = document.getElementById("editorList");
      const quickLinks = document.getElementById("quickLinks");
      try {
        const res = await fetch("editors.json", { cache: "no-store" });
        if (!res.ok) throw new Error("editors.json not found");
        const editors = await res.json();
        if (!Array.isArray(editors) || !editors.length) {
          if (quickLinks) quickLinks.innerHTML = '<span class="quick-chip ghost">No editors listed yet.</span>';
          list.innerHTML = "<li>No editors listed yet.</li>";
          return;
        }
        const hydrated = await Promise.all(editors.map(async (editor) => {
          const repo = editor.repo || "";
          const play = editor.play || "";
          const updated = await fetchLastUpdatedDate(repo);
          return {
            name: editor.name || editor.slug || "Unnamed Editor",
            repo,
            play,
            updated: updated || "Unknown"
          };
        }));

        if (quickLinks) {
          quickLinks.innerHTML = hydrated.map((e) => (
            `<a class="quick-chip" href="${htmlEscape(e.play || e.repo || '#')}" target="_blank" rel="noopener noreferrer">${htmlEscape(e.name)}</a>`
          )).join("");
        }

        list.innerHTML = hydrated.map((e) => {
          return `<li><a href="${htmlEscape(e.play || e.repo || '#')}" target="_blank" rel="noopener noreferrer">${htmlEscape(e.name)}</a> · <a href="${htmlEscape(e.repo)}" target="_blank" rel="noopener noreferrer">repo</a><span class="repo-meta">Last Updated: ${htmlEscape(e.updated)}</span></li>`;
        }).join("");
      } catch {
        if (quickLinks) quickLinks.innerHTML = '<span class="quick-chip ghost">Could not load editor links yet.</span>';
        list.innerHTML = "<li>Could not load editor list yet.</li>";
      }
    }
    function startDuckBubbleMessages() {
      const bubble = document.getElementById("duckBubble");
      if (!bubble) return;
      const messages = [
        "welcome to my Profile",
        "im a duck btw",
        "dev build: snacks + save files",
        "i waddled through your backlog",
        "ship it, then nap",
        "yes, i test on real saves"
      ];
      let i = 0;
      bubble.textContent = messages[i];
      setInterval(() => {
        i = (i + 1) % messages.length;
        bubble.textContent = messages[i];
      }, 6000);
    }
    loadEditors();
    startDuckBubbleMessages();
  </script>
</body>
</html>
