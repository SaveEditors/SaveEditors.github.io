<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveEditors</title>
  <style>
    :root{
      --bg:#bfe7ff;
      --sky-top:#def3ff;
      --sky-bottom:#b7e2ff;
      --grid:rgba(98,136,166,.24);
      --text:#1f2329;
      --soft:#56606a;
      --panel:#ffffffdc;
      --line:#d6dde6;
      --link:#234f7b;
      --grass-a:#84c96d;
      --grass-b:#5ca64a;
      --grass-c:#4a8c3c;
      --stone-a:#9da5ad;
      --stone-b:#8f98a1;
      --stone-c:#aeb5bc;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Segoe UI, system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        radial-gradient(150px 80px at 16% 16%, rgba(255,255,255,.82), rgba(255,255,255,0) 75%),
        radial-gradient(190px 90px at 74% 12%, rgba(255,255,255,.7), rgba(255,255,255,0) 76%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 62%, var(--bg));
      background-size:28px 28px,28px 28px,auto,auto,auto;
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      opacity:0;
      background:linear-gradient(180deg,rgba(12,24,52,.76),rgba(8,14,30,.9));
      animation:nightTintCycle 20s linear infinite;
    }
    body:after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      opacity:0;
      background:
        radial-gradient(circle at 9% 14%, rgba(255,255,255,.95) 0 1px, transparent 2px),
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.9) 0 1px, transparent 2px),
        radial-gradient(circle at 27% 10%, rgba(255,255,255,.86) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 18%, rgba(255,255,255,.92) 0 1px, transparent 2px),
        radial-gradient(circle at 58% 11%, rgba(255,255,255,.88) 0 1px, transparent 2px),
        radial-gradient(circle at 64% 24%, rgba(255,255,255,.86) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 13%, rgba(255,255,255,.92) 0 1px, transparent 2px),
        radial-gradient(circle at 89% 22%, rgba(255,255,255,.9) 0 1px, transparent 2px);
      animation:nightStarsCycle 20s linear infinite;
    }
    .page{
      position:relative;
      z-index:2;
      max-width:920px;
      margin:34px auto 0;
      padding:0 16px 170px;
    }
    .sheet{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(4px);
      box-shadow:0 16px 36px rgba(30,40,54,.08);
      padding:22px 24px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.7rem,3.2vw,2.4rem);
      letter-spacing:.02em;
    }
    .lead{
      margin:0;
      color:var(--soft);
      line-height:1.55;
    }
    .site-nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:0 0 14px;
    }
    .site-nav a{
      display:inline-flex;
      align-items:center;
      border:1px solid #b7d1e7;
      border-radius:999px;
      padding:7px 12px;
      background:rgba(255,255,255,.86);
      color:#244b74;
      font-size:.86rem;
      font-weight:700;
      text-decoration:none;
      border-bottom:none;
      box-shadow:0 3px 8px rgba(50,74,97,.12);
      transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    }
    .site-nav a:hover{
      transform:translateY(-1px);
      border-color:#7faacf;
      box-shadow:0 5px 14px rgba(50,74,97,.18);
      border-bottom:none;
    }
    .site-nav a.kofi{
      border-color:#9e7d2f;
      color:#513e16;
      background:linear-gradient(180deg,#ffe8ad,#ffd67a);
    }
    .quick-links{
      margin:16px 0 0;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .quick-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:.9rem;
      font-weight:600;
      border:1px solid #b7d1e7;
      border-radius:999px;
      padding:7px 12px;
      background:rgba(255,255,255,.86);
      box-shadow:0 3px 8px rgba(50,74,97,.12);
      text-decoration:none;
      color:#244b74;
      border-bottom:none;
      transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    }
    .quick-chip:hover{
      transform:translateY(-1px);
      border-color:#7faacf;
      box-shadow:0 5px 14px rgba(50,74,97,.18);
      border-bottom:none;
    }
    .quick-chip.ghost{
      color:#637486;
      background:#edf3f8;
      border-color:#d6e1ec;
    }
    .kofi-widget{
      position:fixed;
      right:16px;
      top:16px;
      z-index:80;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:9px 13px;
      border-radius:999px;
      border:1px solid #9e7d2f;
      background:linear-gradient(180deg,#ffe8ad,#ffd67a);
      color:#513e16;
      font-weight:700;
      text-decoration:none;
      border-bottom:none;
      box-shadow:0 8px 18px rgba(50,74,97,.24);
    }
    .kofi-widget:hover{
      transform:translateY(-1px);
      border-bottom:none;
    }
    h2{
      margin:24px 0 10px;
      font-size:1.08rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#2d3540;
    }
    ul{
      margin:0;
      padding-left:18px;
    }
    li{
      margin:10px 0;
      line-height:1.45;
    }
    .repo-meta{
      margin-left:8px;
      color:#5a6977;
      font-size:.84rem;
      white-space:nowrap;
    }
    a{
      color:var(--link);
      text-decoration:none;
      border-bottom:1px dashed rgba(35,79,123,.35);
    }
    a:hover{
      border-bottom-color:rgba(35,79,123,.85);
    }
    .scene{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:148px;
      pointer-events:none;
      z-index:30;
    }
    .clouds{
      position:absolute;
      left:0;
      right:0;
      bottom:74px;
      height:44px;
      overflow:hidden;
      opacity:.95;
    }
    .cloud{
      position:absolute;
      display:block;
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      box-shadow:
        20px -8px 0 5px rgba(255,255,255,.82),
        42px -3px 0 2px rgba(255,255,255,.82),
        58px 2px 0 0 rgba(255,255,255,.72);
      filter:drop-shadow(0 2px 3px rgba(80,117,145,.2));
      animation:cloudDrift 30s linear infinite;
    }
    .cloud-a{left:-120px;top:8px;width:72px;animation-duration:34s}
    .cloud-b{left:38%;top:2px;width:84px;animation-duration:44s;animation-delay:-14s}
    .cloud-c{left:72%;top:11px;width:66px;animation-duration:38s;animation-delay:-26s}
    .night-effects{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:4;
    }
    .shooting-star{
      position:absolute;
      width:3px;
      height:3px;
      border-radius:50%;
      background:rgba(255,255,255,.98);
      opacity:0;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.9));
      animation:nightObjectCycle 20s linear infinite,shootingStar 4.2s linear infinite;
    }
    .shooting-star:after{
      content:"";
      position:absolute;
      top:1px;
      left:-70px;
      width:72px;
      height:2px;
      background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.7),rgba(255,255,255,0));
      transform:rotate(-20deg);
      transform-origin:right center;
    }
    .shooting-a{top:16%;left:14%;animation-delay:0s,0s}
    .shooting-b{top:28%;left:68%;animation-delay:0s,1.7s}
    .air-traffic{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:4;
    }
    .plane{
      position:absolute;
      left:-170px;
      width:96px;
      height:16px;
      opacity:0;
      animation:nightObjectCycle 20s linear infinite,planeFly 11s linear infinite;
    }
    .plane:before{
      content:"";
      position:absolute;
      left:0;
      top:7px;
      width:56px;
      height:4px;
      border-radius:999px;
      background:#d9e2eb;
      box-shadow:8px -6px 0 -2px #e9f0f6;
    }
    .plane:after{
      content:"";
      position:absolute;
      left:44px;
      top:4px;
      width:18px;
      height:8px;
      border-radius:2px;
      background:#b6c4d2;
      clip-path:polygon(0 50%,100% 0,100% 100%);
    }
    .plane-a{top:18%;animation-delay:0s,0s}
    .plane-b{top:31%;animation-delay:0s,4.2s}
    .world-decor{
      position:absolute;
      left:0;
      right:0;
      bottom:70px;
      height:62px;
      pointer-events:none;
      z-index:2;
    }
    .bush{
      position:absolute;
      bottom:0;
      width:96px;
      height:28px;
      border-radius:18px 18px 10px 10px;
      background:linear-gradient(180deg,#4fae54 0%,#3a8f45 70%,#2d7738 100%);
      box-shadow:0 3px 0 rgba(27,84,40,.45);
    }
    .bush:before,
    .bush:after{
      content:"";
      position:absolute;
      bottom:10px;
      width:32px;
      height:22px;
      border-radius:18px 18px 8px 8px;
      background:linear-gradient(180deg,#5dc063 0%,#44a34f 80%,#358941 100%);
    }
    .bush:before{left:8px}
    .bush:after{right:8px}
    .bush-a{left:12%;transform:scale(1.02)}
    .bush-b{left:46%;transform:scale(.9)}
    .bush-c{left:76%;transform:scale(1.08)}
    .tree{
      position:absolute;
      bottom:0;
      width:18px;
      height:42px;
      background:#6e4c2d;
      box-shadow:inset -3px 0 0 rgba(35,22,12,.2);
    }
    .tree:before{
      content:"";
      position:absolute;
      left:-19px;
      bottom:18px;
      width:56px;
      height:38px;
      background:
        linear-gradient(180deg,#4cb669 0%,#349551 70%,#2b8045 100%);
      box-shadow:
        0 -16px 0 #3fa95e,
        -10px -8px 0 #3a9f58,
        10px -8px 0 #3a9f58;
      image-rendering:pixelated;
    }
    .tree-a{left:32%}
    .tree-b{left:62%;transform:scale(.95)}
    .grass{
      position:absolute;
      left:0;
      right:0;
      bottom:48px;
      height:22px;
      background:linear-gradient(180deg,var(--grass-a) 0%,var(--grass-b) 72%,var(--grass-c) 100%);
      border-top:1px solid rgba(74,110,57,.35);
      box-shadow:inset 0 2px 3px rgba(255,255,255,.3), inset 0 -3px 4px rgba(37,75,29,.24);
      overflow:visible;
    }
    .grass:before,
    .grass:after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      pointer-events:none;
    }
    .grass:before{
      top:-8px;
      height:10px;
      background:repeating-linear-gradient(
        -62deg,
        rgba(126,183,97,.96) 0 7px,
        rgba(101,160,78,.96) 7px 14px
      ),
      repeating-linear-gradient(
        62deg,
        rgba(114,176,90,.6) 0 7px,
        rgba(89,144,69,.6) 7px 14px
      );
      opacity:1;
    }
    .grass:after{
      top:0;
      bottom:0;
      background:repeating-linear-gradient(
        90deg,
        rgba(58,102,47,0) 0 7px,
        rgba(58,102,47,.34) 7px 8px
      );
      opacity:.42;
    }
    .stone{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:48px;
      background:
        repeating-linear-gradient(90deg,var(--stone-a) 0 42px,var(--stone-b) 42px 84px,var(--stone-c) 84px 126px),
        linear-gradient(180deg,#b6bec6,#9da7b0);
      border-top:1px solid rgba(56,63,72,.4);
      box-shadow:inset 0 6px 10px rgba(255,255,255,.18);
    }
    .duck-lane{
      position:absolute;
      left:0;
      right:0;
      bottom:52px;
      height:96px;
      overflow:visible;
    }
    .duck-wrap{
      position:absolute;
      left:0;
      bottom:0;
      display:flex;
      align-items:flex-end;
      gap:10px;
      will-change:transform;
    }
    .duck{
      width:72px;
      height:72px;
      object-fit:contain;
      image-rendering:auto;
      filter:drop-shadow(0 4px 4px rgba(0,0,0,.18));
      transform-origin:50% 86%;
      animation:duckStep .44s ease-in-out infinite;
    }
    .bubble{
      position:relative;
      margin-bottom:72px;
      padding:7px 11px;
      background:#fff;
      border:1px solid #d7dee6;
      border-radius:999px;
      font-size:.87rem;
      color:#26313b;
      white-space:nowrap;
      box-shadow:0 6px 14px rgba(40,49,60,.12);
      min-width:140px;
      text-align:center;
      animation:bubbleFloat .88s ease-in-out infinite;
    }
    .bubble:after{
      content:"";
      position:absolute;
      width:10px;height:10px;
      left:22px;
      bottom:-6px;
      border-right:1px solid #d7dee6;
      border-bottom:1px solid #d7dee6;
      background:#fff;
      transform:rotate(45deg);
    }
    @keyframes duckStep{
      0%,100%{transform:translateY(0) rotate(-2deg)}
      50%{transform:translateY(-2px) rotate(2deg)}
    }
    @keyframes bubbleFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-1px)}
    }
    @keyframes cloudDrift{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 220px))}
    }
    @keyframes nightTintCycle{
      0%,42%,100%{opacity:0}
      50%,90%{opacity:1}
    }
    @keyframes nightStarsCycle{
      0%,42%,100%{opacity:0}
      55%,88%{opacity:.92}
    }
    @keyframes nightObjectCycle{
      0%,45%,100%{opacity:0}
      52%,88%{opacity:.9}
    }
    @keyframes shootingStar{
      0%,72%{transform:translate(0,0) scale(0);opacity:0}
      75%{transform:translate(0,0) scale(1);opacity:1}
      100%{transform:translate(280px,130px) scale(.7);opacity:0}
    }
    @keyframes planeFly{
      from{transform:translateX(-220px)}
      to{transform:translateX(calc(100vw + 300px))}
    }
    @media (max-width:680px){
      .sheet{padding:18px}
      .bubble{font-size:.8rem}
      .kofi-widget{
        right:10px;
        top:10px;
        font-size:.82rem;
        padding:8px 11px;
      }
    }
  </style>
</head>
<body>
  <a class="kofi-widget" href="https://ko-fi.com/saveeditors" target="_blank" rel="noopener noreferrer">Buy Me A Coffee</a>
  <main class="page">
    <section class="sheet">
      <nav class="site-nav" aria-label="Site Links">
        <a href="https://github.com/SaveEditors/SaveEditors.github.io" target="_blank" rel="noopener noreferrer">Homepage Repo</a>
        <a href="https://github.com/SaveEditors" target="_blank" rel="noopener noreferrer">GitHub Org</a>
        <a class="kofi" href="https://ko-fi.com/saveeditors" target="_blank" rel="noopener noreferrer">Buy Me A Coffee</a>
      </nav>
      <h1>SaveEditors</h1>
      <p class="lead">Welcome to my profile. This is a collection of save editors I've made. Primarily tested with the Windows Xbox Game Pass versions.</p>
      <div id="quickLinks" class="quick-links">
        <span class="quick-chip ghost">Loading editor links...</span>
      </div>

      <h2>Save Editors</h2>
      <ul id="editorList">
        <li>Loading editors...</li>
      </ul>
    </section>
  </main>

  <div class="scene" aria-hidden="true">
    <div class="night-effects">
      <span class="shooting-star shooting-a"></span>
      <span class="shooting-star shooting-b"></span>
    </div>
    <div class="air-traffic">
      <span class="plane plane-a"></span>
      <span class="plane plane-b"></span>
    </div>
    <div class="clouds">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="cloud cloud-c"></span>
    </div>
    <div class="world-decor">
      <span class="bush bush-a"></span>
      <span class="tree tree-a"></span>
      <span class="bush bush-b"></span>
      <span class="tree tree-b"></span>
      <span class="bush bush-c"></span>
    </div>
    <div class="duck-lane">
      <div class="duck-wrap">
        <img class="duck" src="https://files.kick.com/emotes/4147914/fullsize" alt="">
        <div id="duckBubble" class="bubble">welcome to my Profile</div>
      </div>
    </div>
    <div class="grass"></div>
    <div class="stone"></div>
  </div>

  <script>
    "use strict";
    const htmlEscape = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function getRepoPath(repoUrl) {
      try {
        const url = new URL(repoUrl);
        if (url.hostname.toLowerCase() !== "github.com") return "";
        const parts = url.pathname.replace(/^\/+|\/+$/g, "").split("/");
        if (parts.length < 2) return "";
        return `${parts[0]}/${parts[1].replace(/\.git$/i, "")}`;
      } catch {
        return "";
      }
    }

    async function fetchLastUpdatedDate(repoUrl) {
      const repoPath = getRepoPath(repoUrl);
      if (!repoPath) return "";
      try {
        const res = await fetch(`https://api.github.com/repos/${repoPath}/commits?per_page=1`, {
          headers: { Accept: "application/vnd.github+json" },
          cache: "no-store"
        });
        if (!res.ok) return "";
        const commits = await res.json();
        const iso = commits?.[0]?.commit?.committer?.date || commits?.[0]?.commit?.author?.date || "";
        if (!iso) return "";
        return new Date(iso).toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric"
        });
      } catch {
        return "";
      }
    }

    async function loadEditors() {
      const list = document.getElementById("editorList");
      const quickLinks = document.getElementById("quickLinks");
      try {
        const res = await fetch("editors.json", { cache: "no-store" });
        if (!res.ok) throw new Error("editors.json not found");
        const editors = await res.json();
        if (!Array.isArray(editors) || !editors.length) {
          if (quickLinks) quickLinks.innerHTML = '<span class="quick-chip ghost">No editors listed yet.</span>';
          list.innerHTML = "<li>No editors listed yet.</li>";
          return;
        }
        const hydrated = await Promise.all(editors.map(async (editor) => {
          const repo = editor.repo || "";
          const play = editor.play || "";
          const updated = await fetchLastUpdatedDate(repo);
          return {
            name: editor.name || editor.slug || "Unnamed Editor",
            repo,
            play,
            updated: updated || "Unknown"
          };
        }));

        if (quickLinks) {
          quickLinks.innerHTML = hydrated.map((e) => (
            `<a class="quick-chip" href="${htmlEscape(e.play || e.repo || '#')}" target="_blank" rel="noopener noreferrer">${htmlEscape(e.name)}</a>`
          )).join("");
        }

        list.innerHTML = hydrated.map((e) => {
          return `<li><a href="${htmlEscape(e.play || e.repo || '#')}" target="_blank" rel="noopener noreferrer">${htmlEscape(e.name)}</a> · <a href="${htmlEscape(e.repo)}" target="_blank" rel="noopener noreferrer">repo</a><span class="repo-meta">Last Updated: ${htmlEscape(e.updated)}</span></li>`;
        }).join("");
      } catch {
        if (quickLinks) quickLinks.innerHTML = '<span class="quick-chip ghost">Could not load editor links yet.</span>';
        list.innerHTML = "<li>Could not load editor list yet.</li>";
      }
    }
    let duckAnimation = null;

    function startDuckWalk() {
      const lane = document.querySelector(".duck-lane");
      const wrap = document.querySelector(".duck-wrap");
      if (!lane || !wrap || typeof wrap.animate !== "function") return;

      const laneWidth = Math.max(window.innerWidth || 0, lane.clientWidth || 0, 360);
      const startX = 80;
      const endX = Math.max(220, laneWidth - 310);
      const steps = Math.max(10, Math.floor((endX - startX) / 22));
      const keyframes = [];

      for (let i = 0; i <= steps; i += 1) {
        const t = i / steps;
        keyframes.push({
          offset: t * 0.48,
          transform: `translate(${Math.round(startX + (endX - startX) * t)}px, ${i % 2 ? -2 : 0}px)`
        });
      }
      keyframes.push({ offset: 0.5, transform: `translate(${Math.round(endX)}px, 0px)` });
      for (let i = 0; i <= steps; i += 1) {
        const t = i / steps;
        keyframes.push({
          offset: 0.5 + t * 0.5,
          transform: `translate(${Math.round(endX - (endX - startX) * t)}px, ${i % 2 ? -2 : 0}px)`
        });
      }

      if (duckAnimation) duckAnimation.cancel();
      duckAnimation = wrap.animate(keyframes, {
        duration: 16000,
        iterations: Infinity,
        easing: "steps(160,end)"
      });
    }

    function startDuckBubbleMessages() {
      const bubble = document.getElementById("duckBubble");
      if (!bubble) return;
      const messages = [
        "welcome to my Profile",
        "im a duck btw",
        "dev build: snacks + save files",
        "i waddled through your backlog",
        "ship it, then nap",
        "yes, i test on real saves"
      ];
      let i = 0;
      bubble.textContent = messages[i];
      setInterval(() => {
        i = (i + 1) % messages.length;
        bubble.textContent = messages[i];
      }, 6000);
    }
    loadEditors();
    startDuckWalk();
    startDuckBubbleMessages();
    window.addEventListener("resize", startDuckWalk);
  </script>
