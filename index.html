<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveEditors</title>
  <style>
    :root{
      --bg:#bfe7ff;
      --sky-top:#def3ff;
      --sky-bottom:#b7e2ff;
      --grid:rgba(98,136,166,.24);
      --text:#1f2329;
      --soft:#56606a;
      --panel:#ffffffdc;
      --line:#d6dde6;
      --link:#234f7b;
      --grass-a:#84c96d;
      --grass-b:#5ca64a;
      --grass-c:#4a8c3c;
      --stone-a:#9da5ad;
      --stone-b:#8f98a1;
      --stone-c:#aeb5bc;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Segoe UI, system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        radial-gradient(150px 80px at 16% 16%, rgba(255,255,255,.82), rgba(255,255,255,0) 75%),
        radial-gradient(190px 90px at 74% 12%, rgba(255,255,255,.7), rgba(255,255,255,0) 76%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 62%, var(--bg));
      background-size:28px 28px,28px 28px,auto,auto,auto;
      overflow-x:hidden;
    }
    .page{
      max-width:920px;
      margin:34px auto 0;
      padding:0 16px 170px;
    }
    .sheet{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(4px);
      box-shadow:0 16px 36px rgba(30,40,54,.08);
      padding:22px 24px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.7rem,3.2vw,2.4rem);
      letter-spacing:.02em;
    }
    .lead{
      margin:0;
      color:var(--soft);
      line-height:1.55;
    }
    .hello{
      margin:16px 0 0;
      font-size:1.12rem;
      font-weight:600;
    }
    .hello code{
      font-size:1rem;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 10px;
      background:#fff;
    }
    h2{
      margin:24px 0 10px;
      font-size:1.08rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#2d3540;
    }
    ul{
      margin:0;
      padding-left:18px;
    }
    li{
      margin:10px 0;
      line-height:1.45;
    }
    a{
      color:var(--link);
      text-decoration:none;
      border-bottom:1px dashed rgba(35,79,123,.35);
    }
    a:hover{
      border-bottom-color:rgba(35,79,123,.85);
    }
    .scene{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:130px;
      pointer-events:none;
      z-index:30;
    }
    .clouds{
      position:absolute;
      left:0;
      right:0;
      bottom:74px;
      height:44px;
      overflow:hidden;
      opacity:.95;
    }
    .cloud{
      position:absolute;
      display:block;
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      box-shadow:
        20px -8px 0 5px rgba(255,255,255,.82),
        42px -3px 0 2px rgba(255,255,255,.82),
        58px 2px 0 0 rgba(255,255,255,.72);
      filter:drop-shadow(0 2px 3px rgba(80,117,145,.2));
      animation:cloudDrift 30s linear infinite;
    }
    .cloud-a{left:-120px;top:8px;width:72px;animation-duration:34s}
    .cloud-b{left:38%;top:2px;width:84px;animation-duration:44s;animation-delay:-14s}
    .cloud-c{left:72%;top:11px;width:66px;animation-duration:38s;animation-delay:-26s}
    .grass{
      position:absolute;
      left:0;
      right:0;
      bottom:48px;
      height:20px;
      background:linear-gradient(180deg,var(--grass-a) 0%,var(--grass-b) 72%,var(--grass-c) 100%);
      border-top:1px solid rgba(74,110,57,.35);
      box-shadow:inset 0 2px 3px rgba(255,255,255,.3), inset 0 -3px 4px rgba(37,75,29,.24);
    }
    .grass:before,
    .grass:after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      pointer-events:none;
    }
    .grass:before{
      top:0;
      bottom:0;
      background:repeating-linear-gradient(
        -38deg,
        rgba(255,255,255,.2) 0 12px,
        rgba(255,255,255,0) 12px 24px
      );
      opacity:.7;
    }
    .grass:after{
      top:2px;
      bottom:0;
      background:repeating-linear-gradient(
        90deg,
        rgba(58,102,47,0) 0 6px,
        rgba(58,102,47,.38) 6px 7px
      );
      opacity:.45;
    }
    .stone{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:48px;
      background:
        repeating-linear-gradient(90deg,var(--stone-a) 0 42px,var(--stone-b) 42px 84px,var(--stone-c) 84px 126px),
        linear-gradient(180deg,#b6bec6,#9da7b0);
      border-top:1px solid rgba(56,63,72,.4);
      box-shadow:inset 0 6px 10px rgba(255,255,255,.18);
    }
    .duck-lane{
      position:absolute;
      left:0;
      right:0;
      bottom:52px;
      height:72px;
      overflow:hidden;
    }
    .duck-wrap{
      position:absolute;
      left:-120px;
      bottom:0;
      display:flex;
      align-items:flex-end;
      gap:10px;
      animation:duckWalk 16s linear infinite;
    }
    .duck{
      width:72px;
      height:72px;
      object-fit:contain;
      image-rendering:auto;
      filter:drop-shadow(0 4px 4px rgba(0,0,0,.18));
    }
    .bubble{
      position:relative;
      margin-bottom:56px;
      padding:7px 11px;
      background:#fff;
      border:1px solid #d7dee6;
      border-radius:999px;
      font-size:.87rem;
      color:#26313b;
      white-space:nowrap;
      box-shadow:0 6px 14px rgba(40,49,60,.12);
    }
    .bubble:after{
      content:"";
      position:absolute;
      width:10px;height:10px;
      left:22px;
      bottom:-6px;
      border-right:1px solid #d7dee6;
      border-bottom:1px solid #d7dee6;
      background:#fff;
      transform:rotate(45deg);
    }
    @keyframes duckWalk{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 160px))}
    }
    @keyframes cloudDrift{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 220px))}
    }
    @media (max-width:680px){
      .sheet{padding:18px}
      .bubble{font-size:.8rem}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <h1>SaveEditors</h1>
      <p class="lead">Welcome to my profile. This is the simple home for our save editors.</p>
      <p class="hello"><code>helloworld</code></p>

      <h2>Save Editors</h2>
      <ul id="editorList">
        <li>Loading editors...</li>
      </ul>
    </section>
  </main>

  <div class="scene" aria-hidden="true">
    <div class="clouds">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="cloud cloud-c"></span>
    </div>
    <div class="duck-lane">
      <div class="duck-wrap">
        <img class="duck" src="https://files.kick.com/emotes/4147914/fullsize" alt="">
        <div class="bubble">welcome to my Profile</div>
      </div>
    </div>
    <div class="grass"></div>
    <div class="stone"></div>
  </div>

  <script>
    "use strict";
    async function loadEditors() {
      const list = document.getElementById("editorList");
      try {
        const res = await fetch("editors.json", { cache: "no-store" });
        if (!res.ok) throw new Error("editors.json not found");
        const editors = await res.json();
        if (!Array.isArray(editors) || !editors.length) {
          list.innerHTML = "<li>No editors listed yet.</li>";
          return;
        }
        list.innerHTML = editors.map((e) => {
          const play = e.play || "";
          const repo = e.repo || "";
          const name = e.name || e.slug || "Unnamed Editor";
          return `<li><a href="${play}" target="_blank" rel="noopener noreferrer">${name}</a> · <a href="${repo}" target="_blank" rel="noopener noreferrer">repo</a></li>`;
        }).join("");
      } catch {
        list.innerHTML = "<li>Could not load editor list yet.</li>";
      }
    }
    loadEditors();
  </script>
</body>
</html>
