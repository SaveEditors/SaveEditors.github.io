<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveEditors</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --grid:rgba(144,156,170,.26);
      --text:#1f2329;
      --soft:#56606a;
      --panel:#ffffffdc;
      --line:#d6dde6;
      --link:#234f7b;
      --grass-a:#8fbf73;
      --grass-b:#7eab65;
      --stone-a:#9da5ad;
      --stone-b:#8f98a1;
      --stone-c:#aeb5bc;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Segoe UI, system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        radial-gradient(circle at top right, rgba(255,255,255,.75), transparent 36%),
        linear-gradient(180deg, #fbfdff, var(--bg));
      background-size:20px 20px,20px 20px,auto,auto;
      overflow-x:hidden;
    }
    .page{
      max-width:920px;
      margin:34px auto 0;
      padding:0 16px 170px;
    }
    .sheet{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(4px);
      box-shadow:0 16px 36px rgba(30,40,54,.08);
      padding:22px 24px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.7rem,3.2vw,2.4rem);
      letter-spacing:.02em;
    }
    .lead{
      margin:0;
      color:var(--soft);
      line-height:1.55;
    }
    .hello{
      margin:16px 0 0;
      font-size:1.12rem;
      font-weight:600;
    }
    .hello code{
      font-size:1rem;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 10px;
      background:#fff;
    }
    h2{
      margin:24px 0 10px;
      font-size:1.08rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#2d3540;
    }
    ul{
      margin:0;
      padding-left:18px;
    }
    li{
      margin:10px 0;
      line-height:1.45;
    }
    a{
      color:var(--link);
      text-decoration:none;
      border-bottom:1px dashed rgba(35,79,123,.35);
    }
    a:hover{
      border-bottom-color:rgba(35,79,123,.85);
    }
    .scene{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:130px;
      pointer-events:none;
      z-index:30;
    }
    .grass{
      position:absolute;
      left:0;
      right:0;
      bottom:48px;
      height:20px;
      background:repeating-linear-gradient(
        -25deg,
        var(--grass-a) 0 16px,
        var(--grass-b) 16px 32px
      );
      border-top:1px solid rgba(74,110,57,.35);
    }
    .stone{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:48px;
      background:
        repeating-linear-gradient(90deg,var(--stone-a) 0 42px,var(--stone-b) 42px 84px,var(--stone-c) 84px 126px),
        linear-gradient(180deg,#b6bec6,#9da7b0);
      border-top:1px solid rgba(56,63,72,.4);
      box-shadow:inset 0 6px 10px rgba(255,255,255,.18);
    }
    .duck-lane{
      position:absolute;
      left:0;
      right:0;
      bottom:52px;
      height:72px;
      overflow:hidden;
    }
    .duck-wrap{
      position:absolute;
      left:-120px;
      bottom:0;
      display:flex;
      align-items:flex-end;
      gap:10px;
      animation:duckWalk 16s linear infinite;
    }
    .duck{
      width:72px;
      height:72px;
      object-fit:contain;
      image-rendering:auto;
      filter:drop-shadow(0 4px 4px rgba(0,0,0,.18));
    }
    .bubble{
      margin-bottom:34px;
      padding:7px 11px;
      background:#fff;
      border:1px solid #d7dee6;
      border-radius:999px;
      font-size:.87rem;
      color:#26313b;
      white-space:nowrap;
      box-shadow:0 6px 14px rgba(40,49,60,.12);
    }
    .bubble:after{
      content:"";
      position:absolute;
      width:9px;height:9px;
      border-left:1px solid #d7dee6;
      border-bottom:1px solid #d7dee6;
      background:#fff;
      transform:rotate(-45deg);
      margin-left:-56px;
      margin-top:20px;
    }
    @keyframes duckWalk{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 160px))}
    }
    @media (max-width:680px){
      .sheet{padding:18px}
      .bubble{font-size:.8rem}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <h1>SaveEditors</h1>
      <p class="lead">Welcome to my profile. This is the simple home for our save editors.</p>
      <p class="hello"><code>helloworld</code></p>

      <h2>Save Editors</h2>
      <ul id="editorList">
        <li>Loading editors...</li>
      </ul>
    </section>
  </main>

  <div class="scene" aria-hidden="true">
    <div class="duck-lane">
      <div class="duck-wrap">
        <img class="duck" src="https://files.kick.com/emotes/4147914/fullsize" alt="">
        <div class="bubble">welcome to my Profile</div>
      </div>
    </div>
    <div class="grass"></div>
    <div class="stone"></div>
  </div>

  <script>
    "use strict";
    async function loadEditors() {
      const list = document.getElementById("editorList");
      try {
        const res = await fetch("editors.json", { cache: "no-store" });
        if (!res.ok) throw new Error("editors.json not found");
        const editors = await res.json();
        if (!Array.isArray(editors) || !editors.length) {
          list.innerHTML = "<li>No editors listed yet.</li>";
          return;
        }
        list.innerHTML = editors.map((e) => {
          const play = e.play || "";
          const repo = e.repo || "";
          const name = e.name || e.slug || "Unnamed Editor";
          return `<li><a href="${play}" target="_blank" rel="noopener noreferrer">${name}</a> · <a href="${repo}" target="_blank" rel="noopener noreferrer">repo</a></li>`;
        }).join("");
      } catch {
        list.innerHTML = "<li>Could not load editor list yet.</li>";
      }
    }
    loadEditors();
  </script>
</body>
</html>
